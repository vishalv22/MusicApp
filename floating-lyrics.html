<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Floating Lyrics</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            font-family: Arial, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            overflow: hidden;
            -webkit-app-region: drag;
        }
        
        .song-info {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 10px;
            -webkit-app-region: no-drag;
        }
        
        .lyric-line {
            opacity: 0.5;
            transition: all 0.3s ease;
            margin: 5px 0;
        }
        
        .lyric-line.active {
            opacity: 1;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="song-info" id="songInfo">No song playing</div>
    <div id="lyricsContainer">No lyrics available</div>

    <script>
        const { ipcRenderer } = require('electron');
        
        ipcRenderer.on('update-lyric', (event, data) => {
            if (data.songInfo) {
                document.getElementById('songInfo').textContent = 
                    `${data.songInfo.title} - ${data.songInfo.artist}`;
            }
            
            if (data.lyrics) {
                const container = document.getElementById('lyricsContainer');
                container.innerHTML = '';
                
                data.lyrics.forEach((lyric, index) => {
                    const div = document.createElement('div');
                    div.className = 'lyric-line';
                    div.textContent = lyric.text;
                    div.dataset.index = index;
                    container.appendChild(div);
                });
            }
            
            if (data.currentIndex !== undefined) {
                document.querySelectorAll('.lyric-line').forEach((line, index) => {
                    line.classList.toggle('active', index === data.currentIndex);
                });
            }
        });
    </script>
</body>
</html>
